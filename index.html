<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GitHub Free Slots</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🎰 GitHub Luck 🎰</h1>
        <div class="stats">
            <p>Guthaben: <span id="balance">1000</span> 🪙</p>
            <p>Status: <span id="status">Viel Glück!</span></p>
        </div>

        <div class="slot-machine">
            <div class="reel" id="reel1">🍒</div>
            <div class="reel" id="reel2">🔔</div>
            <div class="reel" id="reel3">💎</div>
            <div class="reel" id="reel4">🍋</div>
            <div class="reel" id="reel5">7️⃣</div>
        </div>

        <div class="controls">
            <label>Einsatz: </label>
            <input type="number" id="bet-input" value="10" min="1">
            <button id="spin-button">SPIN!</button>
        </div>
        
        <div id="free-spins-alert" class="hidden">FREE SPINS AKTIV!</div>
    </div>
    <script src="script.js"></script>
</body>
</html>

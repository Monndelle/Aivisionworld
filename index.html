<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium GitHub Slots 🎰</title>
    <style>
        :root {
            --gold: #ffcc00;
            --neon-green: #00ff88;
            --danger: rgba(255, 50, 50, 0.9);
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-wrapper {
            background: rgba(20, 20, 25, 0.95);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            width: 95vw;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: var(--glass);
            border-radius: 12px;
        }

        .balance-display { font-size: 1.4rem; font-weight: 800; color: var(--neon-green); }

        .slot-machine {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            background: #000;
            padding: 8px;
            border-radius: 15px;
            border: 2px solid #222;
        }

        .symbol {
            background: linear-gradient(145deg, #222, #111);
            height: 18vw;
            max-height: 80px;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .win-highlight { 
            border-color: var(--gold); 
            box-shadow: 0 0 15px var(--gold);
            background: linear-gradient(145deg, #332b00, #111);
            transform: scale(1.02);
            z-index: 2;
        }

        .spinning { animation: blurAnim var(--speed) infinite linear; }
        @keyframes blurAnim { 0% { filter: blur(0px); transform: translateY(-1px); } 100% { filter: blur(4px); transform: translateY(1px); } }

        .controls {
            margin-top: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .control-box {
            background: var(--glass);
            padding: 8px;
            border-radius: 10px;
            text-align: center;
        }

        .control-box label { font-size: 0.6rem; color: #888; display: block; margin-bottom: 4px; }

        input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            width: 100%;
            text-align: center;
            outline: none;
        }

        input[type="range"] { accent-color: var(--gold); }

        .btn-group { grid-column: span 3; display: flex; gap: 10px; margin-top: 5px; }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
        }

        #spin-btn { background: var(--gold); color: #000; flex: 2; }
        #auto-btn { background: #333; color: #fff; flex: 1; }
        .auto-running { background: #ff4444 !important; }

        .overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            z-index: 1000;
            justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
            padding: 20px;
        }

        #bonus-overlay { background: rgba(255, 204, 0, 0.2); }
        #bankrupt-overlay { background: var(--danger); }

        .popup {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            text-align: center;
            width: 100%;
            max-width: 300px;
        }

        .popup h2 { margin: 0 0 10px 0; color: var(--gold); }
    </style>
</head>
<body>

    <div id="bonus-overlay" class="overlay">
        <div class="popup">
            <h2 id="bonus-title">BONUS!</h2>
            <p id="bonus-msg"></p>
            <button onclick="closePopup()" style="width:100%; background:var(--gold);">START</button>
        </div>
    </div>

    <div id="bankrupt-overlay" class="overlay">
        <div class="popup" style="border-color: white;">
            <h2 style="color: white;">PLEITE! 💸</h2>
            <p>Einsatz zu hoch oder Konto leer.</p>
            <button onclick="resetGame()" style="width:100%; background:white; color:black;">Hol dir neue 10,00 €</button>
        </div>
    </div>

    <div class="game-wrapper">
        <div class="stats-bar">
            <div class="balance-display">€ <span id="balance">10.00</span></div>
            <div id="fs-indicator" style="display:none; color: var(--gold); font-size: 0.8rem;">FS: <span id="fs-count">0</span></div>
            <button onclick="resetGame()" style="background:none; color:#444; border:none; font-size: 10px;">RESET</button>
        </div>

        <div class="slot-machine" id="machine">
            </div>

        <div class="controls">
            <div class="control-box">
                <label>Einsatz (€)</label>
                <input type="number" id="bet" value="0.20" step="0.10">
            </div>
            <div class="control-box">
                <label>Auto (<span id="auto-val">10</span>)</label>
                <input type="range" id="auto-slider" min="1" max="50" value="10" oninput="document.getElementById('auto-val').textContent=this.value">
            </div>
            <div class="control-box">
                <label>Speed</label>
                <input type="range" id="speed-slider" min="50" max="400" value="250">
            </div>
            
            <div class="btn-group">
                <button id="spin-btn">SPIN</button>
                <button id="auto-btn">AUTO</button>
            </div>
        </div>
        <p id="status" style="text-align: center; color: #444; font-size: 0.7rem; margin-top: 10px;">5 Gewinnlinien aktiv</p>
    </div>

    <script>
        const symbols = ['🍒','🍋','🍒','🍇','🍒','🔔','🍋','🍒','🍇','🍋','🍒','💎','🍋','🍇','🍒','7️⃣','🍋','🍒','💶','🍇','🔔','🍒','🍋'];
        let balance = 10.00;
        let freeSpins = 0;
        let bonusTotal = 0;
        let isSpinning = false;
        let autoCount = 0;

        const machine = document.getElementById('machine');
        for(let i=0; i<5; i++) {
            const col = document.createElement('div');
            col.className = 'reel-column';
            col.id = `col-${i}`;
            for(let j=0; j<3; j++) {
                const sym = document.createElement('div');
                sym.className = 'symbol';
                sym.textContent = '🎰';
                col.appendChild(sym);
            }
            machine.appendChild(col);
        }

        const spinBtn = document.getElementById('spin-btn');
        const autoBtn = document.getElementById('auto-btn');

        spinBtn.addEventListener('click', () => { autoCount = 0; stopAutoUI(); startSpin(); });
        autoBtn.addEventListener('click', () => {
            if(autoCount > 0) { autoCount = 0; stopAutoUI(); }
            else { 
                autoCount = parseInt(document.getElementById('auto-slider').value); 
                autoBtn.classList.add('auto-running');
                autoBtn.textContent = `STOP (${autoCount})`;
                startSpin(); 
            }
        });

        function startSpin() {
            if(isSpinning) return;
            
            let bet = parseFloat(document.getElementById('bet').value);
            // ANTI-CHEAT & VALIDIERUNG
            if(isNaN(bet) || bet < 0.01) { 
                bet = 0.01; 
                document.getElementById('bet').value = "0.10";
            }
            if(bet > balance && freeSpins === 0) {
                document.getElementById('bankrupt-overlay').style.display = 'flex';
                autoCount = 0; stopAutoUI();
                return;
            }

            isSpinning = true;
            spinBtn.disabled = true;
            document.querySelectorAll('.symbol').forEach(s => s.classList.remove('win-highlight'));

            if(freeSpins > 0) {
                freeSpins--;
            } else {
                balance -= bet;
                bonusTotal = 0; // Reset bonus total when normal spin starts
                if(autoCount > 0) { autoCount--; autoBtn.textContent = `STOP (${autoCount})`; }
            }

            const speed = 450 - document.getElementById('speed-slider').value;
            document.documentElement.style.setProperty('--speed', (speed/1000)+'s');
            updateUI();

            const cols = document.querySelectorAll('.reel-column');
            cols.forEach(c => c.classList.add('spinning'));

            setTimeout(() => {
                const screen = [[],[],[],[],[]];
                cols.forEach((col, i) => {
                    col.classList.remove('spinning');
                    const syms = col.querySelectorAll('.symbol');
                    let stop = Math.floor(Math.random() * symbols.length);
                    for(let j=0; j<3; j++) {
                        let s = symbols[(stop + j) % symbols.length];
                        syms[j].textContent = s;
                        screen[i][j] = s;
                    }
                });

                evaluate(screen, bet);
                isSpinning = false;
                spinBtn.disabled = false;

                // AUTO-SPIN LOGIK (auch für Freispiele)
                if(freeSpins > 0 || autoCount > 0) {
                    setTimeout(startSpin, 400);
                } else {
                    stopAutoUI();
                }
            }, speed * 3);
        }

        function evaluate(screen, bet) {
            let win = 0;
            const lines = [
                [[0,1],[1,1],[2,1],[3,1],[4,1]], [[0,0],[1,0],[2,0],[3,0],[4,0]], [[0,2],[1,2],[2,2],[3,2],[4,2]],
                [[0,0],[1,1],[2,2],[3,1],[4,0]], [[0,2],[1,1],[2,0],[3,1],[4,2]]
            ];

            let bonusSymbols = 0;
            for(let i=0; i<5; i++) for(let j=0; j<3; j++) if(screen[i][j]==='💶') bonusSymbols++;

            if(bonusSymbols >= 3) {
                const f = Math.floor(Math.random()*5)+7;
                freeSpins += f;
                showPopup("💶 BONUS!", `${f} Freispiele gewonnen!`);
                return;
            }

            lines.forEach(line => {
                let first = screen[line[0][0]][line[0][1]];
                let count = 1;
                for(let k=1; k<5; k++) if(screen[line[k][0]][line[k][1]] === first) count++; else break;
                if(count >= 3) {
                    let m = {'🍒':0.5,'🍋':1,'🍇':2,'🔔':5,'💎':15,'7️⃣':50}[first] || 0;
                    let lWin = (bet/5) * m * (count === 5 ? 5 : 1);
                    win += lWin;
                    for(let k=0; k<count; k++) document.getElementById(`col-${line[k][0]}`).querySelectorAll('.symbol')[line[k][1]].classList.add('win-highlight');
                }
            });

            if(win > 0) {
                balance += win;
                if(freeSpins >= 0 && (bonusTotal > 0 || win > 0)) bonusTotal += win;
                document.getElementById('status').textContent = `WIN: +${win.toFixed(2)}€`;
            }

            // POPUP NACH BONUS-ENDE
            if(freeSpins === 0 && bonusTotal > 0.01) {
                showPopup("BONUS ENDE", `Gesamtgewinn: ${bonusTotal.toFixed(2)}€`);
                bonusTotal = 0;
            }
            updateUI();
        }

        function showPopup(t, m) {
            document.getElementById('bonus-title').textContent = t;
            document.getElementById('bonus-msg').textContent = m;
            document.getElementById('bonus-overlay').style.display = 'flex';
        }

        function closePopup() {
            document.getElementById('bonus-overlay').style.display = 'none';
        }

        function stopAutoUI() {
            autoBtn.classList.remove('auto-running');
            autoBtn.textContent = "AUTO";
        }

        function resetGame() {
            balance = 10.00; freeSpins = 0; bonusTotal = 0; autoCount = 0;
            document.getElementById('bankrupt-overlay').style.display = 'none';
            stopAutoUI(); updateUI();
        }

        function updateUI() {
            document.getElementById('balance').textContent = balance.toFixed(2);
            const ind = document.getElementById('fs-indicator');
            if(freeSpins > 0) {
                ind.style.display = 'block';
                document.getElementById('fs-count').textContent = freeSpins;
                spinBtn.style.background = "magenta";
                spinBtn.textContent = "FREE";
            } else {
                ind.style.display = 'none';
                spinBtn.style.background = "var(--gold)";
                spinBtn.textContent = "SPIN";
            }
        }
    </script>
</body>
</html>

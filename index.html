<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Hardcore Slots рЯО∞</title>
    <style>
        :root { --gold: #ffd700; --neon-green: #39ff14; }
        body { background: #050505; color: white; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .game-wrapper { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 3px solid #444; text-align: center; width: 480px; }
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 1.4rem; color: var(--neon-green); font-family: monospace; }
        .slot-machine { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #000; padding: 10px; border-radius: 10px; border: 2px solid #333; }
        .reel-column { display: flex; flex-direction: column; gap: 5px; }
        .symbol { background: #222; height: 80px; font-size: 2.5rem; display: flex; align-items: center; justify-content: center; border-radius: 4px; border: 1px solid #333; }
        .spinning { filter: blur(4px); transform: scale(0.95); }
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        input { background: #000; border: 1px solid var(--gold); color: white; padding: 10px; width: 80px; text-align: center; border-radius: 5px; font-size: 1.2rem; }
        button { background: var(--gold); border: none; padding: 15px; font-size: 1.5rem; font-weight: bold; border-radius: 10px; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index:100; justify-content: center; align-items: center; text-align: center; }
        .popup { border: 3px solid var(--gold); padding: 30px; background: #111; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="bonus-overlay" class="overlay">
        <div class="popup">
            <h2 id="bonus-title" style="color:var(--gold); font-size: 3rem;">FREISPIELE!</h2>
            <p id="bonus-msg" style="font-size: 1.5rem;"></p>
            <button onclick="closePopup()">START</button>
        </div>
    </div>

    <div class="game-wrapper">
        <div class="stats-bar">
            <span>вВђ <span id="balance">10.00</span></span>
            <span id="fs-ui" style="display:none; color:magenta;">FS: <span id="fs-count">0</span></span>
        </div>

        <div class="slot-machine" id="machine">
            <div class="reel-column" id="col-0"></div>
            <div class="reel-column" id="col-1"></div>
            <div class="reel-column" id="col-2"></div>
            <div class="reel-column" id="col-3"></div>
            <div class="reel-column" id="col-4"></div>
        </div>

        <div class="controls">
            <div>Einsatz: <input type="number" id="bet" value="0.20" step="0.10" min="0.10"> вВђ</div>
            <button id="spin-btn">SPIN</button>
            <div id="status" style="font-size: 0.9rem; color: #777;">Mindesteinsatz 0,10вВђ</div>
        </div>
    </div>

    <script>
        // Walzen-Konfiguration (Simuliert echte Streifen)
        const reelStrip = ['рЯНТ','рЯНЛ','рЯНЗ','рЯНТ','рЯФФ','рЯНТ','рЯНЛ','рЯНЗ','рЯТО','рЯНТ','рЯНЛ','рЯНЗ','7пЄПвГ£','рЯНТ','рЯТґ','рЯНЛ','рЯНЗ','рЯФФ'];
        let balance = 10.00;
        let freeSpins = 0;
        let totalBonusWin = 0;
        let isSpinning = false;

        // Initialisierung
        for(let i=0; i<5; i++) {
            const col = document.getElementById(`col-${i}`);
            for(let j=0; j<3; j++) {
                const div = document.createElement('div');
                div.className = 'symbol';
                div.textContent = 'рЯО∞';
                col.appendChild(div);
            }
        }

        const spinBtn = document.getElementById('spin-btn');
        spinBtn.addEventListener('click', () => {
            const bet = parseFloat(document.getElementById('bet').value);
            if(balance < bet && freeSpins === 0) return alert("Guthaben zu niedrig!");
            
            startSpin(bet);
        });

        function startSpin(bet) {
            if(isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;

            if(freeSpins > 0) {
                freeSpins--;
            } else {
                balance -= bet;
                totalBonusWin = 0;
            }
            updateUI();

            const allCols = document.querySelectorAll('.reel-column');
            allCols.forEach(col => col.classList.add('spinning'));

            setTimeout(() => {
                const screen = [[],[],[],[],[]]; // [Spalte][Reihe]
                allCols.forEach((col, i) => {
                    col.classList.remove('spinning');
                    const symbolsInCol = col.querySelectorAll('.symbol');
                    // W√§hle zuf√§lligen Stopp-Punkt auf dem Walzenstreifen
                    let stop = Math.floor(Math.random() * reelStrip.length);
                    for(let j=0; j<3; j++) {
                        let symbol = reelStrip[(stop + j) % reelStrip.length];
                        symbolsInCol[j].textContent = symbol;
                        screen[i][j] = symbol;
                    }
                });

                evaluate(screen, bet);
                isSpinning = false;
                spinBtn.disabled = false;
            }, 800);
        }

        function evaluate(screen, bet) {
            let win = 0;
            let bonusCount = 0;

            // 1. Bonus Check (√Ьberall auf dem Schirm)
            for(let i=0; i<5; i++) {
                for(let j=0; j<3; j++) {
                    if(screen[i][j] === 'рЯТґ') bonusCount++;
                }
            }

            if(bonusCount >= 3) {
                const won = Math.floor(Math.random() * 5) + 5; // 5-10 Freispiele
                freeSpins += won;
                document.getElementById('bonus-title').textContent = "рЯТґ BONUS!";
                document.getElementById('bonus-msg').textContent = `${won} Freispiele gewonnen!`;
                document.getElementById('bonus-overlay').style.display = 'flex';
                return;
            }

            // 2. Gewinnlinien (Wir pr√Љfen nur die mittlere Reihe f√Љr Einfachheit/H√§rte)
            // Nur von links nach rechts!
            let first = screen[0][1];
            let count = 1;
            for(let i=1; i<5; i++) {
                if(screen[i][1] === first) count++;
                else break;
            }

            if(count >= 3) {
                let multi = { 'рЯНТ':2, 'рЯНЛ':3, 'рЯНЗ':4, 'рЯФФ':10, 'рЯТО':50, '7пЄПвГ£':100 }[first] || 0;
                win = bet * multi * (count / 3);
            }

            if(win > 0) {
                balance += win;
                if(freeSpins > 0 || totalBonusWin > 0) totalBonusWin += win;
                document.getElementById('status').innerHTML = `<b style="color:var(--neon-green)">GEWINN: ${win.toFixed(2)}вВђ</b>`;
            } else {
                document.getElementById('status').textContent = "Kein Treffer.";
            }

            // Bonus Ende Popup
            if(freeSpins === 0 && totalBonusWin > 0 && bonusCount < 3) {
                document.getElementById('bonus-title').textContent = "BONUS ENDE";
                document.getElementById('bonus-msg').textContent = `Gesamtgewinn: ${totalBonusWin.toFixed(2)}вВђ`;
                document.getElementById('bonus-overlay').style.display = 'flex';
                totalBonusWin = 0;
            }

            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').textContent = balance.toFixed(2);
            if(freeSpins > 0) {
                document.getElementById('fs-ui').style.display = 'inline';
                document.getElementById('fs-count').textContent = freeSpins;
                spinBtn.textContent = "FREE SPIN";
            } else {
                document.getElementById('fs-ui').style.display = 'none';
                spinBtn.textContent = "SPIN";
            }
        }

        function closePopup() {
            document.getElementById('bonus-overlay').style.display = 'none';
            if(freeSpins > 0) startSpin(parseFloat(document.getElementById('bet').value));
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitHub Slots Fixed 🎰</title>
    <style>
        :root { --gold: #ffcc00; --neon: #00ff88; --danger: #ff4444; --glass: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0a0c; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        .game-wrapper { background: #141419; padding: 20px; border-radius: 20px; border: 1px solid #333; width: 95vw; max-width: 450px; text-align: center; }
        .stats-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 10px; background: var(--glass); border-radius: 10px; }
        .balance { font-size: 1.5rem; font-weight: bold; color: var(--neon); }
        
        .slot-machine { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #000; padding: 8px; border-radius: 12px; }
        .symbol { background: #1a1a1a; height: 75px; font-size: 2rem; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid #222; }
        .win-highlight { border-color: var(--gold); background: #332b00; box-shadow: inset 0 0 10px var(--gold); }
        
        .spinning { animation: blurAnim var(--speed) infinite linear; }
        @keyframes blurAnim { 0%, 100% { transform: translateY(0); filter: blur(0); } 50% { transform: translateY(2px); filter: blur(4px); } }

        .controls { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .control-box { background: var(--glass); padding: 5px; border-radius: 8px; }
        label { font-size: 0.6rem; color: #888; display: block; }
        input { background: transparent; border: none; color: white; width: 100%; text-align: center; font-weight: bold; outline: none; }

        .btn-group { grid-column: span 3; display: flex; gap: 8px; margin-top: 5px; }
        button { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; flex: 1; }
        #spin-btn { background: var(--gold); color: #000; flex: 2; }
        #auto-btn { background: #333; color: #fff; }
        button:disabled { opacity: 0.3; }
        .active-auto { background: var(--danger) !important; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .popup { background: #111; padding: 25px; border-radius: 15px; border: 2px solid var(--gold); width: 80%; max-width: 300px; }
    </style>
</head>
<body>

    <div id="popup-overlay" class="overlay">
        <div class="popup">
            <h2 id="pop-title" style="color:var(--gold); margin:0;">TITLE</h2>
            <p id="pop-msg" style="font-size: 1.1rem; margin: 15px 0;"></p>
            <button onclick="closePop()" style="background:var(--gold); width: 100%;">OK</button>
        </div>
    </div>

    <div class="game-wrapper">
        <div class="stats-bar">
            <div class="balance">€ <span id="balance">10.00</span></div>
            <div id="fs-label" style="display:none; color:magenta; font-weight:bold;">FS: <span id="fs-count">0</span></div>
            <button onclick="reset()" style="background:none; color:#555; width:auto; padding:0; font-size:10px;">RESET</button>
        </div>

        <div id="machine" class="slot-machine"></div>

        <div class="controls">
            <div class="control-box"><label>EINSATZ</label><input type="number" id="bet" value="0.20" step="0.01"></div>
            <div class="control-box"><label>AUTO (<span id="at-v">10</span>)</label><input type="range" id="at-s" min="1" max="50" value="10" oninput="document.getElementById('at-v').textContent=this.value"></div>
            <div class="control-box"><label>SPEED</label><input type="range" id="sp-s" min="50" max="400" value="250"></div>
            <div class="btn-group">
                <button id="spin-btn">SPIN</button>
                <button id="auto-btn">AUTO</button>
            </div>
        </div>
        <p id="status" style="font-size:0.7rem; color:#444; margin:10px 0 0 0;">Bereit zum Drehen...</p>
    </div>

<script>
    const reels = ['🍒','🍋','🍒','🍇','🍒','🔔','🍒','💎','🍒','7️⃣','🍒','💶','🍋','🍇','🔔'];
    let bal = 10.00, fs = 0, bWin = 0, spinning = false, auto = 0;

    const mach = document.getElementById('machine');
    for(let i=0; i<5; i++){
        let c = document.createElement('div'); c.id = `c-${i}`;
        for(let j=0; j<3; j++) { let s = document.createElement('div'); s.className='symbol'; s.textContent='🎰'; c.appendChild(s); }
        mach.appendChild(c);
    }

    const sBtn = document.getElementById('spin-btn');
    const aBtn = document.getElementById('auto-btn');

    sBtn.onclick = () => { auto = 0; stopAUI(); start(); };
    aBtn.onclick = () => {
        if(auto > 0) { auto = 0; stopAUI(); }
        else { auto = parseInt(document.getElementById('at-s').value); aBtn.classList.add('active-auto'); start(); }
    };

    function start() {
        if(spinning) return;
        let bVal = document.getElementById('bet');
        let bet = parseFloat(bVal.value);

        if(isNaN(bet) || bet < 0.01) bet = 0.01;
        if(bet > bal && fs === 0) { bet = bal; bVal.value = bal.toFixed(2); }
        if(bal <= 0 && fs === 0) { showPop("PLEITE!", "Hol dir neue 10€", true); return; }

        spinning = true;
        sBtn.disabled = true;
        document.querySelectorAll('.symbol').forEach(s => s.classList.remove('win-highlight'));

        if(fs > 0) { fs--; } 
        else { bal -= bet; if(auto > 0) { auto--; aBtn.textContent = `STOP (${auto})`; } }
        
        updateUI();
        let speed = 450 - document.getElementById('sp-s').value;
        document.documentElement.style.setProperty('--speed', (speed/1000)+'s');
        
        const cols = document.querySelectorAll('[id^="c-"]');
        cols.forEach(c => c.classList.add('spinning'));

        setTimeout(() => {
            let screen = [[],[],[],[],[]];
            cols.forEach((c, i) => {
                c.classList.remove('spinning');
                let ss = c.querySelectorAll('.symbol');
                for(let j=0; j<3; j++) {
                    let sym = reels[Math.floor(Math.random()*reels.length)];
                    ss[j].textContent = sym;
                    screen[i][j] = sym;
                }
            });
            check(screen, bet);
            spinning = false;
            sBtn.disabled = false;

            if(!document.getElementById('popup-overlay').style.display || document.getElementById('popup-overlay').style.display === 'none') {
                if(fs > 0 || auto > 0) setTimeout(start, 400); else stopAUI();
            }
        }, speed * 3);
    }

    function check(scr, bet) {
        let win = 0, bonus = 0;
        scr.forEach(col => col.forEach(s => { if(s==='💶') bonus++; }));

        if(bonus >= 3) {
            let add = Math.floor(Math.random()*8)+5;
            fs += add; bWin = 0;
            showPop("💶 BONUS!", `${add} Freispiele!`);
            return;
        }

        const lines = [[[0,1],[1,1],[2,1],[3,1],[4,1]], [[0,0],[1,0],[2,0],[3,0],[4,0]], [[0,2],[1,2],[2,2],[3,2],[4,2]], [[0,0],[1,1],[2,2],[3,1],[4,0]], [[0,2],[1,1],[2,0],[3,1],[4,2]]];
        lines.forEach(l => {
            let f = scr[l[0][0]][l[0][1]], count = 1;
            for(let k=1; k<5; k++) if(scr[l[k][0]][l[k][1]] === f) count++; else break;
            if(count >= 3) {
                let m = {'🍒':0.5,'🍋':1,'🍇':2,'🔔':5,'💎':15,'7️⃣':50}[f] || 0;
                let lW = (bet/5) * m; win += lW;
                for(let k=0; k<count; k++) document.getElementById(`c-${l[k][0]}`).querySelectorAll('.symbol')[l[k][1]].classList.add('win-highlight');
            }
        });

        if(win > 0) { bal += win; if(fs >= 0 && (bWin > 0 || win > 0)) bWin += win; }
        document.getElementById('status').textContent = win > 0 ? `GEWINN: +${win.toFixed(2)}€` : "Niete";
        
        if(fs === 0 && bWin > 0) { showPop("BONUS ENDE", `Gesamt: ${bWin.toFixed(2)}€`); bWin = 0; }
        updateUI();
    }

    function showPop(t, m, isR = false) {
        document.getElementById('pop-title').textContent = t;
        document.getElementById('pop-msg').textContent = m;
        document.getElementById('popup-overlay').style.display = 'flex';
        document.getElementById('popup-overlay').onclick = isR ? reset : null;
    }

    function closePop() {
        document.getElementById('popup-overlay').style.display = 'none';
        if((fs > 0 || auto > 0) && !spinning) start();
    }

    function stopAUI() { auto = 0; aBtn.classList.remove('active-auto'); aBtn.textContent = "AUTO"; }
    function reset() { bal = 10; fs = 0; bWin = 0; stopAUI(); updateUI(); document.getElementById('popup-overlay').style.display='none'; }
    function updateUI() {
        document.getElementById('balance').textContent = bal.toFixed(2);
        let fl = document.getElementById('fs-label');
        if(fs > 0) { fl.style.display = 'block'; document.getElementById('fs-count').textContent = fs; sBtn.textContent = "FREE"; sBtn.style.background = "magenta"; }
        else { fl.style.display = 'none'; sBtn.textContent = "SPIN"; sBtn.style.background = "var(--gold)"; }
    }
</script>
</body>
</html>

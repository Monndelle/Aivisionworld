<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Ultra Slots 🎰</title>
    <style>
        :root {
            --gold: #ffd700;
            --dark-red: #8b0000;
            --neon-green: #39ff14;
        }
        body {
            background: #050505;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-wrapper {
            background: linear-gradient(145deg, #1a1a1a, #000);
            padding: 30px;
            border-radius: 25px;
            border: 4px solid var(--gold);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.15);
            text-align: center;
            position: relative;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }

        .slot-machine {
            display: grid;
            grid-template-columns: repeat(5, 90px);
            grid-template-rows: repeat(3, 110px);
            gap: 12px;
            background: #222;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #444;
            margin-bottom: 20px;
        }

        .symbol {
            background: #fff;
            color: #000;
            font-size: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
        }

        .spinning { animation: blurAnim 0.1s infinite linear; }
        @keyframes blurAnim { 
            0% { transform: translateY(-2px); filter: blur(1px); } 
            100% { transform: translateY(2px); filter: blur(3px); } 
        }

        .controls { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        .input-group {
            background: #111;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid var(--gold);
        }

        input[type="number"] {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            width: 100px;
            text-align: center;
            outline: none;
        }

        button {
            background: linear-gradient(to bottom, #ffd700, #daa520);
            border: none;
            padding: 15px 60px;
            font-size: 2rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #916f00;
        }
        button:hover { filter: brightness(1.1); }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #916f00; }
        button:disabled { background: #333; box-shadow: none; color: #666; cursor: wait; }

        /* Pop-Up Styles */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .popup {
            background: #222;
            padding: 40px;
            border: 5px solid var(--gold);
            border-radius: 20px;
            text-align: center;
            animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes zoomIn { from { transform: scale(0); } to { transform: scale(1); } }
        .popup h2 { font-size: 3rem; color: var(--gold); margin: 0; }
        .popup p { font-size: 1.5rem; }
        .popup button { font-size: 1.2rem; padding: 10px 30px; margin-top: 20px; }

        .bonus-mode { border-color: #ff00ff !important; box-shadow: 0 0 60px #ff00ff !important; }
    </style>
</head>
<body>

    <div id="bonus-start-overlay" class="overlay">
        <div class="popup">
            <h2>💶 BONUS! 💶</h2>
            <p>Du hast <span id="popup-fs-count">0</span> Freispiele gewonnen!</p>
            <button onclick="closePopup('bonus-start-overlay')">LOS GEHT'S!</button>
        </div>
    </div>

    <div id="bonus-end-overlay" class="overlay">
        <div class="popup">
            <h2>BONUS ENDE</h2>
            <p>Gesamtgewinn im Bonus:</p>
            <h2 style="color: var(--neon-green);"><span id="total-bonus-win">0.00</span>€</h2>
            <button onclick="closePopup('bonus-end-overlay')">ZURÜCK ZUM SPIEL</button>
        </div>
    </div>

    <div class="game-wrapper" id="main-frame">
        <div class="stats-bar">
            <span>💰 <span id="balance">500.00</span>€</span>
            <span id="fs-display" style="display:none; color: #ff00ff;">FS: <span id="fs-val">0</span></span>
        </div>

        <div class="slot-machine" id="grid"></div>

        <div class="controls">
            <div class="input-group">
                <label>EINSATZ: </label>
                <input type="number" id="bet-input" value="2.00" step="0.50" min="0.10">
                <span>€</span>
            </div>
            <button id="spin-btn">SPIN</button>
            <div id="status-text" style="color: #888;">Stelle deinen Einsatz ein...</div>
        </div>
    </div>

    <script>
        const symbols = ['🍒', '🍋', '🍇', '🔔', '💎', '7️⃣', '💶'];
        let balance = 500.00;
        let freeSpins = 0;
        let isSpinning = false;
        let bonusWinAccumulator = 0;
        let isInBonus = false;

        const grid = document.getElementById('grid');
        const spinBtn = document.getElementById('spin-btn');
        const balanceEl = document.getElementById('balance');
        const statusEl = document.getElementById('status-text');
        const betInput = document.getElementById('bet-input');
        const mainFrame = document.getElementById('main-frame');

        // Grid initialisieren
        for (let i = 0; i < 15; i++) {
            const div = document.createElement('div');
            div.className = 'symbol';
            div.textContent = '🎰';
            grid.appendChild(div);
        }

        spinBtn.addEventListener('click', () => {
            const bet = parseFloat(betInput.value);
            if (isNaN(bet) || bet <= 0) return alert("Ungültiger Einsatz!");
            if (balance < bet && freeSpins === 0) return alert("Guthaben leer!");

            executeSpin(bet);
        });

        function executeSpin(bet) {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;

            if (freeSpins > 0) {
                freeSpins--;
            } else {
                balance -= bet;
            }
            updateUI();

            const cells = document.querySelectorAll('.symbol');
            cells.forEach(c => c.classList.add('spinning'));

            setTimeout(() => {
                const results = [];
                cells.forEach(c => {
                    c.classList.remove('spinning');
                    let rand = Math.random();
                    let symbol;
                    
                    // Casino-Mathematik: Bonus ist extrem selten (1.5% pro Feld)
                    if (rand < 0.015) symbol = '💶'; 
                    else if (rand < 0.04) symbol = '7️⃣';
                    else if (rand < 0.08) symbol = '💎';
                    else if (rand < 0.15) symbol = '🔔';
                    else if (rand < 0.35) symbol = '🍇';
                    else if (rand < 0.60) symbol = '🍋';
                    else symbol = '🍒';
                    
                    c.textContent = symbol;
                    results.push(symbol);
                });

                evaluate(results, bet);
                isSpinning = false;
                spinBtn.disabled = false;
            }, 1000);
        }

        function evaluate(res, bet) {
            const counts = {};
            res.forEach(s => counts[s] = (counts[s] || 0) + 1);

            // Bonus Check
            if (counts['💶'] >= 3) {
                const wonFS = Math.floor(Math.random() * 8) + 7; // 7 bis 15 Freispiele
                freeSpins += wonFS;
                bonusWinAccumulator = 0;
                isInBonus = true;
                document.getElementById('popup-fs-count').textContent = wonFS;
                document.getElementById('bonus-start-overlay').style.display = 'flex';
                mainFrame.classList.add('bonus-mode');
            }

            // Gewinn-Logik (Sehr streng: Man braucht mind. 5 gleiche für kleine Gewinne)
            let currentSpinWin = 0;
            for (let s in counts) {
                if (counts[s] >= 5) { // Nur selten Gewinne
                    let multi = 0;
                    if (s === '7️⃣') multi = 50;
                    else if (s === '💎') multi = 20;
                    else multi = 5;
                    currentSpinWin += bet * multi * (counts[s] / 5);
                }
            }

            if (currentSpinWin > 0) {
                balance += currentSpinWin;
                if (isInBonus) bonusWinAccumulator += currentSpinWin;
                statusEl.innerHTML = `<span style="color:var(--neon-green)">GEWINN: ${currentSpinWin.toFixed(2)}€</span>`;
            } else {
                statusEl.textContent = "...";
            }

            // Wenn Freispiele zu Ende
            if (isInBonus && freeSpins === 0) {
                setTimeout(() => {
                    document.getElementById('total-bonus-win').textContent = bonusWinAccumulator.toFixed(2);
                    document.getElementById('bonus-end-overlay').style.display = 'flex';
                    isInBonus = false;
                    mainFrame.classList.remove('bonus-mode');
                }, 500);
            }

            updateUI();
        }

        function updateUI() {
            balanceEl.textContent = balance.toFixed(2);
            const fsDisp = document.getElementById('fs-display');
            if (freeSpins > 0) {
                fsDisp.style.display = 'inline';
                document.getElementById('fs-val').textContent = freeSpins;
                spinBtn.textContent = "FREE SPIN";
            } else {
                fsDisp.style.display = 'none';
                spinBtn.textContent = "SPIN";
            }
        }

        function closePopup(id) {
            document.getElementById(id).style.display = 'none';
            if (freeSpins > 0) executeSpin(parseFloat(betInput.value));
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pro Slots 🎰</title>
    <style>
        :root {
            --gold: #ffd700;
            --neon-blue: #00d4ff;
        }
        body {
            background: #0a0a0a;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .game-wrapper {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            border: 3px solid var(--gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            text-align: center;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.5rem;
            background: #000;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        /* 3x5 Raster */
        .slot-machine {
            display: grid;
            grid-template-columns: repeat(5, 80px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background: #333;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .symbol {
            background: linear-gradient(145deg, #eee, #bbb);
            color: #000;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        .spinning { animation: blur 0.15s infinite alternate; }
        @keyframes blur { from { filter: blur(0px); } to { filter: blur(4px); } }

        .bonus-active { color: var(--gold); animation: pulse 0.5s infinite; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .controls { display: flex; flex-direction: column; gap: 15px; }
        .bet-select { font-size: 1.2rem; padding: 5px; border-radius: 5px; background: #000; color: white; border: 1px solid var(--gold); }
        
        button {
            background: linear-gradient(to bottom, #ff4e50, #f9d423);
            border: none;
            padding: 15px 50px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #900;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #900; }
        button:disabled { background: #444; box-shadow: none; cursor: wait; }

        #status-text { height: 24px; margin-top: 10px; color: var(--neon-blue); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="stats-bar">
            <span>💰 <span id="balance">500.00</span>€</span>
            <span id="free-spins-tag" style="display:none; color: var(--gold);">FREE SPINS: <span id="fs-count">0</span></span>
        </div>

        <div class="slot-machine" id="grid">
            </div>

        <div class="controls">
            <div>
                Einsatz: 
                <select id="bet-amount" class="bet-select">
                    <option value="1">1.00€</option>
                    <option value="5">5.00€</option>
                    <option value="10">10.00€</option>
                    <option value="50">50.00€</option>
                    <option value="100">100.00€</option>
                </select>
            </div>
            <button id="spin-btn">SPIN</button>
            <div id="status-text">Drücke Spin zum Starten!</div>
        </div>
    </div>

    <script>
        const symbols = ['🍒', '🍋', '🍇', '🔔', '💎', '7️⃣', '💶'];
        let balance = 500.00;
        let freeSpins = 0;
        let isSpinning = false;

        const grid = document.getElementById('grid');
        const spinBtn = document.getElementById('spin-btn');
        const balanceEl = document.getElementById('balance');
        const statusEl = document.getElementById('status-text');
        const fsTag = document.getElementById('free-spins-tag');
        const fsCountEl = document.getElementById('fs-count');

        // Initialisiere das 3x5 Feld
        for (let i = 0; i < 15; i++) {
            const div = document.createElement('div');
            div.className = 'symbol';
            div.textContent = '❓';
            grid.appendChild(div);
        }

        spinBtn.addEventListener('click', () => {
            const bet = parseFloat(document.getElementById('bet-amount').value);
            if (balance < bet && freeSpins === 0) {
                statusEl.textContent = "Pleite! Lade die Seite neu für 500€.";
                return;
            }
            startSpin(bet);
        });

        function startSpin(bet) {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;

            if (freeSpins > 0) {
                freeSpins--;
            } else {
                balance -= bet;
            }
            updateUI();

            const cells = document.querySelectorAll('.symbol');
            cells.forEach(c => c.classList.add('spinning'));
            statusEl.textContent = "Viel Glück...";

            setTimeout(() => {
                const results = [];
                cells.forEach(c => {
                    c.classList.remove('spinning');
                    // Gewichtete Wahrscheinlichkeit: 💶 (Bonus) und 7️⃣ sind seltener
                    let rand = Math.random();
                    let symbol;
                    if (rand < 0.05) symbol = '💶'; // 5% Chance pro Feld für Bonus
                    else if (rand < 0.12) symbol = '7️⃣';
                    else if (rand < 0.25) symbol = '💎';
                    else symbol = symbols[Math.floor(Math.random() * 4)]; // Standard-Früchte
                    
                    c.textContent = symbol;
                    results.push(symbol);
                });

                evaluateGame(results, bet);
                isSpinning = false;
                spinBtn.disabled = false;
            }, 800);
        }

        function evaluateGame(res, bet) {
            // Zähle Vorkommen
            const counts = {};
            res.forEach(s => counts[s] = (counts[s] || 0) + 1);

            let win = 0;
            
            // Logik für Bonus (💶)
            if (counts['💶'] >= 3) {
                let extraSpins = Math.floor(Math.random() * 10) + 5;
                freeSpins += extraSpins;
                statusEl.textContent = `BONUS! 💶 ${extraSpins} Freispiele gewonnen!`;
                return;
            }

            // Logik für Gewinne (basierend auf Einsatz)
            // Hoher Einsatz (>=50) macht es schwerer (Volatilität)
            const difficulty = bet >= 50 ? 5 : 4; 
            
            for (let s in counts) {
                if (counts[s] >= difficulty) {
                    let multiplier = (s === '7️⃣' || s === '💎') ? 20 : 5;
                    win += bet * multiplier * (counts[s] / 3);
                }
            }

            if (win > 0) {
                balance += win;
                statusEl.textContent = `GEWINN: ${win.toFixed(2)}€!`;
            } else {
                statusEl.textContent = freeSpins > 0 ? "Freispiel läuft..." : "Kein Gewinn.";
            }
            updateUI();
        }

        function updateUI() {
            balanceEl.textContent = balance.toFixed(2);
            if (freeSpins > 0) {
                fsTag.style.display = 'inline';
                fsCountEl.textContent = freeSpins;
                spinBtn.textContent = "FREE SPIN";
            } else {
                fsTag.style.display = 'none';
                spinBtn.textContent = "SPIN";
            }
        }
    </script>
</body>
</html>
